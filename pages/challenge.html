<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="https://randomspot.netlify.app/static/img/og-main.png" />
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>랜덤 챌린지</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <link rel="icon" href="/static/img/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9815986502338537"
            crossorigin="anonymous"></script>
</head>
<body>

<div class="page tool-page">
    <div id="toast" class="toast"></div>
    <section class="card">
        <div style="display:flex; justify-content:flex-start; margin-bottom: 12px;">
            <button id="goMainBtn" class="secondary-btn go-main-btn">
                🏠 메인으로
            </button>
        </div>

        <h1 class="title">랜덤 챌린지</h1>
        <p class="subtitle">오늘의 챌린지를 뽑아보세요!</p>

        <section class="content-box">
            <h2>사용 방법</h2>
            <p>
                “시작하기”를 누르면 오늘의 챌린지 하나가 랜덤으로 정해집니다.
                무엇을 할지 막막할 때, 가볍게 첫 행동을 정하는 기준으로 사용해 보세요.
            </p>
            <ul>
                <li>부담이 크면 난이도를 조절하거나 비슷한 행동으로 바꿔서 실행해도 괜찮습니다.</li>
                <li>결과가 나오면 이미지 저장이나 공유 링크로 기록을 남기거나 함께 도전할 수 있어요.</li>
            </ul>

            <!--<h2>FAQ</h2>
            <ul>
                <li><b>Q.</b> 마음에 안 들면 다시 뽑아도 되나요? <b><br>A.</b> 가능하지만, 2~3번까지만 추천해요.</li>
                <li><b>Q.</b> 결과를 저장할 수 있나요? <b><br>A.</b> 이미지 저장 기능을 사용하세요.</li>
            </ul>-->

            <p class="muted">
                안내: 위험하거나 무리한 챌린지는 건너뛰고, 현재 상황에 맞게 조절해 주세요.
            </p>
        </section>

        <button id="startBtn" style="margin-top: 18px">시작하기</button>

        <!-- 말풍선 영역 -->
        <div id="bubbleWrap" class="bubble-wrap dis-none">
            <div id="bubble" class="bubble"></div>
        </div>

        <!-- 결과 관련 버튼들 -->
        <div class="actions" id="actions">
            <button id="saveImgBtn" class="secondary-btn">
                <span class="icon">🖼️</span>
                결과 이미지로 저장
            </button>
            <button id="shareBtn" class="secondary-btn">
                <span class="icon">🔗</span>
                결과 공유하기
            </button>
        </div>
    </section>
</div>

<div class="footer-links">
    <a href="../static/html/about.html" style="color:#aaa; text-decoration:none;">소개</a>
    <a href="../static/html/contact.html" style="color:#aaa; text-decoration:none;">문의</a>
    <a href="../static/html/terms.html" style="color:#aaa; text-decoration:none;">이용약관</a>
    <a href="../static/html/privacy.html" style="color:#aaa; text-decoration:none;">개인정보처리방침</a>
</div>

<script>
    const startBtn = document.getElementById("startBtn");
    const bubbleWrap = document.getElementById("bubbleWrap");
    const bubble = document.getElementById("bubble");
    const actions = document.getElementById("actions");
    const saveImgBtn = document.getElementById("saveImgBtn");
    const shareBtn = document.getElementById("shareBtn");
    const toast = document.getElementById("toast");

    let hasStarted = false;
    let challenge = [];
    let isJsonLoaded = false;

    // 처음에는 버튼 비활성화
    startBtn.disabled = true;
    startBtn.textContent = "데이터 불러오는 중...";

    // json 파일 fetch 로드
    async function loadJson() {
        try {
            const response = await fetch("/static/files/challenge.json");
            challenge = await response.json();
            isJsonLoaded = true;

            // 버튼 활성화
            startBtn.disabled = false;
            startBtn.textContent = hasStarted ? "다시하기" : "시작하기";
        } catch (e) {
            console.error(e);
            isJsonLoaded = false;
            startBtn.disabled = true;
            startBtn.textContent = "로드 실패";
            alert("JSON 파일을 불러오지 못했습니다.");
        }
    }

    function pickRandomChallenge() {
        const idx = Math.floor(Math.random() * challenge.length);
        return challenge[idx];
    }

    // 데이터 → 공유용 URL (현재 주소 + 파라미터만 추가)
    function buildShareUrl(data) {
        const json = JSON.stringify(data);
        const z = LZString.compressToEncodedURIComponent(json);
        return `${window.location.origin}${window.location.pathname}?z=${z}`;
    }

    // URL에서 result 파라미터 읽어오기 (공유로 바로 들어온 경우용)
    function parseResultFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const z = params.get("z");
        if (z) {
            try {
                const json = LZString.decompressFromEncodedURIComponent(z);
                return json ? JSON.parse(json) : null;
            } catch (e) {
                return null;
            }
        }

        const encoded = params.get("result");
        if (!encoded) return null;

        try {
            return JSON.parse(decodeURIComponent(encoded));
        } catch (e) {
            return null;
        }
    }

    // 토스트 팝업 노출
    function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 2000);
    }

    // 결과 뿌리는 공통 함수 (주소창은 건드리지 않음)
    function showResult(data) {
        bubble.classList.remove("show");

        setTimeout(() => {
            bubble.innerHTML = data;
            bubble.classList.add("show");
        }, 80);

        const shareUrl = buildShareUrl(data);
        shareBtn.dataset.url = shareUrl;
    }

    // 시작 / 다시하기 버튼
    startBtn.addEventListener("click", () => {
        if (!hasStarted) {
            startBtn.textContent = "다시하기";
            actions.style.display = "flex";
            bubbleWrap.classList.remove("dis-none");
            hasStarted = true;
        }

        const data = pickRandomChallenge();
        showResult(data);
    });

    // 이미지 저장
    saveImgBtn.addEventListener("click", () => {
        if (!bubble.classList.contains("show")) return;

        html2canvas(bubble, {
            backgroundColor: null,
            scale: 2
        }).then(canvas => {
            const link = document.createElement("a");
            link.download = "random-challenge.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }).catch(() => {
            alert("이미지 저장 중 오류가 발생했어요.");
        });
    });

    // 결과 공유: 지금 결과가 반영된 URL만 클립보드에 복사 (주소창은 그대로)
    shareBtn.addEventListener("click", async () => {
        const urlToCopy = shareBtn.dataset.url || `${window.location.origin}${window.location.pathname}`;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            try {
                await navigator.clipboard.writeText(urlToCopy);
                showToast("링크 복사 완료! 친구한테 바로 보내세요 ✨");
            } catch {
                showToast("복사에 실패했어요 😢");
            }
        } else {
            showToast("이 브라우저에서는 자동 복사가 안 돼요 😭");
        }
    });

    // 공유 URL로 바로 들어온 경우: 결과 자동 복원
    window.addEventListener("load", () => {
        loadJson();

        const data = parseResultFromUrl();
        if (!data) return;

        actions.style.display = "flex";
        startBtn.textContent = "다시하기";
        bubbleWrap.classList.remove("dis-none");
        hasStarted = true;

        showResult(data);

        const cleanUrl = `${window.location.origin}${window.location.pathname}`;
        window.history.replaceState({}, "", cleanUrl);
    });

    // 메인 페이지 이동
    document.getElementById("goMainBtn").addEventListener("click", () => {
        window.location.href = "../index.html";
    });
</script>
</body>
</html>
