<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>랜덤 지역 뽑기</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="icon" href="../static/img/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9815986502338537"
            crossorigin="anonymous"></script>
</head>
<body>

<div class="page">
    <div id="toast" class="toast"></div>
    <section class="card">
        <div style="display:flex; justify-content:flex-start; margin-bottom: 12px;">
            <button id="goMainBtn" class="secondary-btn" style="padding:6px 12px; font-size:12px;">
                🏠 메인으로
            </button>
        </div>

        <h1 class="title">랜덤 지역 뽑기</h1>
        <p class="subtitle">전국 행정구역 중 시·군·구·읍·면·리까지 랜덤으로 정해보세요.</p>

        <button id="startBtn">시작하기</button>

        <div class="bubble-wrap">
            <div id="bubble" class="bubble"></div>
        </div>

        <div class="actions" id="actions">
            <button id="saveImgBtn" class="secondary-btn">
                <span class="icon">🖼️</span>
                결과 이미지로 저장
            </button>
            <button id="shareBtn" class="secondary-btn">
                <span class="icon">📤</span>
                결과 공유하기
            </button>
        </div>
    </section>
</div>

<div class="footer-links">
    <a href="../static/html/privacy.html" style="color:#aaa; text-decoration:none;">개인정보처리방침</a>
</div>

<script>
    const startBtn = document.getElementById("startBtn");
    const bubble = document.getElementById("bubble");
    const actions = document.getElementById("actions");
    const saveImgBtn = document.getElementById("saveImgBtn");
    const shareBtn = document.getElementById("shareBtn");
    const toast = document.getElementById("toast");

    let hasStarted = false;
    let regions = [];
    let stepTimer = null;
    let isCsvLoaded = false;   // ✅ CSV 로드 여부 플래그

    // 처음에는 버튼 비활성화
    startBtn.disabled = true;
    startBtn.textContent = "데이터 불러오는 중...";

    // CSV 파일 fetch 로드
    async function loadCsv() {
        try {
            const response = await fetch("../static/files/regions.csv");
            const text = await response.text();
            regions = parseCsv(text);
            isCsvLoaded = true;                     // ✅ 로드 완료 표시

            // 버튼 활성화
            startBtn.disabled = false;
            startBtn.textContent = hasStarted ? "다시하기" : "시작하기";

            console.log("CSV 로딩 완료:", regions.length, "건");
        } catch (e) {
            console.error(e);
            isCsvLoaded = false;
            startBtn.disabled = true;
            startBtn.textContent = "로드 실패";
            alert("CSV 파일을 불러오지 못했습니다.");
        }
    }

    // CSV 파싱
    function parseCsv(text) {
        const lines = text.trim().split(/\r?\n/);
        const result = [];

        for (let i = 1; i < lines.length; i++) {
            const [code, name] = lines[i].split(",");
            if (!code || !name) continue;
            result.push({
                code: code.trim(),
                name: name.trim()
            });
        }
        return result;
    }

    function pickRandomRegion() {
        const idx = Math.floor(Math.random() * regions.length);
        return regions[idx];
    }

    function buildShareUrl(region) {
        const payload = { code: region.code, name: region.name };
        const encoded = encodeURIComponent(JSON.stringify(payload));
        return `${window.location.origin}${window.location.pathname}?result=${encoded}`;
    }

    function parseResultFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get("result");
        if (!encoded) return null;
        try {
            return JSON.parse(decodeURIComponent(encoded));
        } catch {
            return null;
        }
    }

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => {
            toast.classList.remove("show");
        }, 2000);
    }

    function stopStepTimer() {
        if (stepTimer) {
            clearInterval(stepTimer);
            stepTimer = null;
        }
    }

    // 0.5초 간격으로 단계적으로 행정구역 표시
    function showRegionStepByStep(region) {
        stopStepTimer();

        const name = region.name.trim();
        const parts = name.split(/\s+/).filter(Boolean);
        let index = 0;

        bubble.classList.remove("show");

        setTimeout(() => {
            function render() {
                const current = parts.slice(0, index + 1).join(" ");
                bubble.innerHTML = `${current}`;
                bubble.classList.add("show");
                index++;

                if (index >= parts.length) {
                    stopStepTimer();
                }
            }

            render();
            stepTimer = setInterval(render, 500);
        }, 80);
    }

    function showRegion(region) {
        if (!region) return;
        showRegionStepByStep(region);

        const shareUrl = buildShareUrl(region);
        shareBtn.dataset.url = shareUrl;
    }

    // 시작 / 다시하기 버튼
    startBtn.addEventListener("click", () => {
        // ✅ CSV 로드 안 됐으면 바로 차단
        if (!isCsvLoaded) {
            showToast("데이터를 불러오는 중입니다. 잠시 후 다시 눌러주세요.");
            return;
        }

        if (!hasStarted) {
            startBtn.textContent = "다시하기";
            actions.style.display = "flex";
            hasStarted = true;
        }

        if (!regions.length) {
            alert("행정구역 데이터가 비어 있습니다.");
            return;
        }

        const region = pickRandomRegion();
        showRegion(region);
    });

    // 이미지 저장 (말풍선만 캡처)
    saveImgBtn.addEventListener("click", () => {
        if (!bubble.classList.contains("show")) return;

        html2canvas(bubble, {
            backgroundColor: null,
            scale: 2
        }).then(canvas => {
            const link = document.createElement("a");
            link.download = "random-region.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }).catch(() => {
            alert("이미지 저장 중 오류가 발생했습니다.");
        });
    });

    // 결과 공유
    shareBtn.addEventListener("click", async () => {
        const urlToCopy = shareBtn.dataset.url || `${window.location.origin}${window.location.pathname}`;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            try {
                await navigator.clipboard.writeText(urlToCopy);
                showToast("현재 결과가 포함된 링크를 클립보드에 복사했어요 ✨");
            } catch {
                showToast("복사에 실패했습니다 😢");
            }
        } else {
            showToast("이 브라우저에서는 자동 복사가 지원되지 않아요 😭");
        }
    });

    // 공유 URL로 바로 들어온 경우: 결과 복원 + 주소창 정리
    window.addEventListener("load", () => {
        loadCsv(); // CSV는 백그라운드로 로드

        const data = parseResultFromUrl();
        if (!data) return;

        actions.style.display = "flex";
        startBtn.textContent = "다시하기";
        hasStarted = true;

        showRegionStepByStep({ code: data.code, name: data.name });
        shareBtn.dataset.url = buildShareUrl(data);

        const cleanUrl = `${window.location.origin}${window.location.pathname}`;
        window.history.replaceState({}, "", cleanUrl);
    });

    // 메인 페이지 이동
    document.getElementById("goMainBtn").addEventListener("click", () => {
        window.location.href = "../index.html";
    });
</script>

</body>
</html>
